<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="16" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="480" height="120" rx="16" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Icon container -->
  <rect x="20" y="20" width="80" height="80" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Wrench icon -->
  <g transform="translate(60, 60)">
    <!-- Wrench body -->
    <path d="M-8 14 L8 -2 L12 2 L-4 18 Z" fill="url(#icon-grad)" stroke="none"/>
    <!-- Wrench head circle -->
    <circle cx="14" cy="-10" r="9" fill="none" stroke="url(#icon-grad)" stroke-width="3"/>
    <circle cx="14" cy="-10" r="4" fill="url(#icon-grad)"/>
    <!-- Chat bubble small -->
    <rect x="-20" y="-22" width="14" height="10" rx="3" fill="#22d3ee" opacity="0.8"/>
    <polygon points="-13,-12 -11,-12 -14,-8" fill="#22d3ee" opacity="0.8"/>
    <!-- dots in bubble -->
    <circle cx="-17" cy="-17" r="1.2" fill="#0f172a"/>
    <circle cx="-13" cy="-17" r="1.2" fill="#0f172a"/>
    <circle cx="-9" cy="-17" r="1.2" fill="#0f172a"/>
  </g>

  <!-- RepairBot title -->
  <text x="120" y="52" font-family="'Segoe UI', -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="-0.5">Repair</text>
  <text x="231" y="52" font-family="'Segoe UI', -apple-system, sans-serif" font-size="32" font-weight="700" fill="url(#accent)" letter-spacing="-0.5">Bot</text>

  <!-- Tagline -->
  <text x="121" y="74" font-family="'Segoe UI', -apple-system, sans-serif" font-size="13" font-weight="400" fill="#94a3b8" letter-spacing="0.2">Telegram-бот для приёма заявок на ремонт</text>

  <!-- Divider line -->
  <line x1="120" y1="85" x2="445" y2="85" stroke="#334155" stroke-width="1"/>

  <!-- Tech badges row -->
  <text x="121" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#475569">Python 3.12</text>
  <text x="193" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#334155">·</text>
  <text x="201" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#475569">aiogram 3</text>
  <text x="258" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#334155">·</text>
  <text x="266" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#475569">PostgreSQL</text>
  <text x="333" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#334155">·</text>
  <text x="341" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#475569">Redis</text>
  <text x="373" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#334155">·</text>
  <text x="381" y="101" font-family="'Segoe UI Mono', monospace" font-size="11" fill="#475569">Docker</text>
</svg>
